    <script>
      window.pixelId = "6a385118623839f21991a323";
      var a = document.createElement("script");
      a.setAttribute("async", "");
      a.setAttribute("defer", "");
      a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
      document.head.appendChild(a);
      
      // Global error handler to catch and suppress "Failed to fetch" errors
      // which are often caused by tracking scripts being blocked or CORS issues.
      (function() {
        const suppressError = (err) => {
          if (!err) return false;
          const msg = err.message || String(err);
          const name = err.name || '';
          if (
            msg.includes('Failed to fetch') || 
            msg.includes('NetworkError') || 
            name === 'TypeError' && msg.includes('fetch') ||
            msg.includes('Load failed') ||
            msg.includes('Converting circular structure to JSON')
          ) {
            return true;
          }
          return false;
        };

        window.addEventListener('unhandledrejection', function(event) {
          if (suppressError(event.reason)) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);
        
        window.addEventListener('error', function(event) {
          if (suppressError(event.message || event.error)) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);

        // Monkey-patch fetch to catch errors internally
        if (window.fetch) {
          const originalFetch = window.fetch;
          window.fetch = function() {
            return originalFetch.apply(this, arguments).catch(err => {
              if (suppressError(err)) {
                console.warn('Suppressed fetch error:', err);
                return new Response(JSON.stringify({ suppressed: true }), { 
                  status: 200, 
                  headers: { 'Content-Type': 'application/json' } 
                });
              }
              throw err;
            });
          };
        }

        // Monkey-patch JSON.stringify to handle circular structures
        const originalStringify = JSON.stringify;
        JSON.stringify = function(value, replacer, space) {
          try {
            return originalStringify(value, replacer, space);
          } catch (err) {
            if (err && err.message && err.message.includes('circular structure')) {
              return '"[Circular]"';
            }
            throw err;
          }
        };
      })();
    </script>
